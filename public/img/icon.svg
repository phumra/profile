<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- พื้นหลังโค้งมนละมุน คุมโทนสี from-indigo-200 (#C7D2FE) -->
  <rect width="32" height="32" rx="8" fill="#C7D2FE"/>
  
  <!-- ตัวอักษร Ph สี Indigo เข้มเข้มตัดกันชัดเจน อ่านง่ายบนแท็บเบราว์เซอร์ -->
  <text x="16" y="21" 
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="15" 
        font-weight="800" 
        fill="#3730A3" 
        text-anchor="middle" 
        letter-spacing="-0.5">Ph</text>
</svg>
